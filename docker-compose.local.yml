services:
  # Qdrant: using Qdrant Cloud (QDRANT_URL in .env)
  # Neo4j: using Neo4j Aura (NEO4J_URI in .env)

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ira
      POSTGRES_PASSWORD: ira
      POSTGRES_DB: ira_crm
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    mem_limit: 512m
    networks:
      - ira-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    mem_limit: 256m
    networks:
      - ira-network

networks:
  ira-network:
    driver: bridge
