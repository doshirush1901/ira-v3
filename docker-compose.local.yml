services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    mem_limit: 1g
    networks:
      - ira-network

  neo4j:
    image: neo4j:5.15.0-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/ira_knowledge_graph
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - ./data/neo4j:/data
    mem_limit: 2g
    networks:
      - ira-network

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ira
      POSTGRES_PASSWORD: ira
      POSTGRES_DB: ira_crm
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    mem_limit: 512m
    networks:
      - ira-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    mem_limit: 256m
    networks:
      - ira-network

networks:
  ira-network:
    driver: bridge
