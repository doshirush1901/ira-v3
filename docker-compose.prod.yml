services:
  ira-app:
    build: .
    restart: always
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: postgresql+asyncpg://ira:ira@postgres:5432/ira_crm
      NEO4J_URI: bolt://neo4j:7687
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
      - postgres
      - neo4j
    networks:
      - ira-network

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    networks:
      - ira-network

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ira}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ira}
      POSTGRES_DB: ${POSTGRES_DB:-ira_crm}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - ira-network

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-ira_password}
    volumes:
      - ./data/neo4j:/data
    networks:
      - ira-network

networks:
  ira-network:
    driver: bridge
